<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan IT - Weather & Travel Explorer</title>
    
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    <div class="search-top">
        <input type="text" id="cityInput" placeholder="Enter a city name (e.g. Delhi )" />
        <button id="searchBtn">Search</button>
        <p id="errorMsg" class="error hidden">City not found. Please try again.</p>
    </div>

    
    <main id="mainContent" class="hidden glass-container">
        
        
        <div class="left-panel">
            <div class="current-weather">
                <div class="temp-section">
                    <h1 id="currentTemp">--°</h1>
                    <img id="currentIcon" src="" alt="Icon" />
                </div>
                <h2 id="cityName">Location</h2>
                <p class="current-details">
                    <span id="currentTime">00:00</span> | H:<span id="currentHigh">--</span>° L:<span id="currentLow">--</span>°
                </p>
                <p class="weather-desc" id="currentDesc">--</p>
            </div>
        </div>

        
        <div class="right-panel">
            
            
            <div class="glass-box intervals-widget">
                <p id="intervalAlert" class="alert-text">Forecast coming up</p>
                <div class="intervals-list" id="intervalsContainer">
                    
                </div>
            </div>

            
            <div class="glass-box daily-widget">
                <p class="widget-title">5-Day Forecast</p>
                <div class="daily-list" id="dailyContainer">
                    
                </div>
            </div>

        </div>
    </main>

   
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
